<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квест</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            /* Указываем путь относительно текущей директории */
            background-image: url('./background.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            color: #fff;
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 10px;
            border: 1px solid #333;
            max-width: 90%;
            box-sizing: border-box;
        }

        .btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 24px;
            background-color: #222;
            color: #fff;
            text-decoration: none;
            border: 1px solid #555;
            border-radius: 5px;
            font-size: 16px;
            transition: 0.2s;
            cursor: pointer;
            font-family: monospace;
        }

        .btn:hover {
            background-color: #444;
            border-color: #777;
        }

        #downloadArea {
            display: none;
            margin-top: 20px;
            border-top: 1px solid #444;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <audio id="questAudio" loop preload="auto">
        <source src="./sound.wav" type="audio/wav">
        Ваш браузер не поддерживает аудио элемент.
    </audio>

    <div class="container">
        <h1>Квест начинается</h1>
        <p>Для полного погружения рекомендуется включить звук.</p>
        
        <button id="soundBtn" class="btn">🔊 ВКЛЮЧИТЬ ЗВУК</button>

        <div id="downloadArea">
            <p>Звук включен. Теперь можно получить файл.</p>
            <a href="./quest.zip" class="btn" download>📥 Скачать файл</a>
        </div>
    </div>

    <script>
        const audio = document.getElementById('questAudio');
        const soundBtn = document.getElementById('soundBtn');
        const downloadArea = document.getElementById('downloadArea');

        soundBtn.addEventListener('click', function() {
            // Принудительно загружаем файл перед проигрыванием
            audio.load();
            
            audio.play()
                .then(() => {
                    // Успешный запуск
                    soundBtn.style.display = 'none';
                    downloadArea.style.display = 'block';
                })
                .catch(error => {
                    console.error("Ошибка воспроизведения:", error);
                    alert("Не удалось загрузить или воспроизвести аудио. Проверьте, лежит ли файл sound.wav в репозитории.");
                });
        });
    </script>

</body>
</html>
