<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Квест</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            background-image: url('background.jpg'); /* Имя вашей картинки */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            color: #fff;
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #222;
            color: #fff;
            text-decoration: none;
            border: 1px solid #555;
            border-radius: 5px;
            font-size: 16px;
            transition: 0.2s;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #444;
            border-color: #777;
        }
    </style>
</head>
<body>

    <!-- Фоновый звук в формате WAV -->
    <audio autoplay loop>
        <source src="sound.wav" type="audio/wav"> <!-- Укажите имя вашего wav файла -->
        Ваш браузер не поддерживает аудио элемент.
    </audio>

    <div class="container">
        <h1>Квест начинается</h1>
        <p>Нажмите кнопку ниже, чтобы получить файл для продолжения.</p>
        
        <!-- Если используете архив quest.zip, то меняем ссылку на него. 
             Это решит проблему с открытием текста в браузере. -->
        <a href="quest.zip" class="btn" download>Скачать файл</a>
    </div>

</body>
</html>
