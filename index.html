<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Квест</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            /* Убедитесь, что имя файла background.jpg совпадает с вашим */
            background-image: url('background.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            color: #fff;
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .btn {
            display: inline-block;
            margin: 10px; /* Отступы между кнопками */
            padding: 12px 24px;
            background-color: #222;
            color: #fff;
            text-decoration: none;
            border: 1px solid #555;
            border-radius: 5px;
            font-size: 16px;
            transition: 0.2s;
            cursor: pointer;
            font-family: monospace;
        }

        .btn:hover {
            background-color: #444;
            border-color: #777;
        }

        /* Скрываем кнопку скачивания по умолчанию */
        #downloadArea {
            display: none;
            margin-top: 20px;
            border-top: 1px solid #444;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <!-- Аудио элемент (наш .wav файл) -->
    <!-- Убедитесь, что имя файла sound.wav совпадает с вашим и лежит рядом -->
    <audio id="questAudio" loop>
        <source src="sound.wav" type="audio/wav">
        Ваш браузер не поддерживает аудио элемент.
    </audio>

    <div class="container">
        <h1>Квест начинается</h1>
        <p>Для полного погружения рекомендуется включить звук.</p>
        
        <!-- Кнопка включения звука -->
        <button id="soundBtn" class="btn">🔇 ВКЛЮЧИТЬ ЗВУК</button>

        <!-- Блок, который появится после включения звука -->
        <div id="downloadArea">
            <p>Звук включен. Теперь можно получить файл.</p>
            <!-- Ссылка на скачивание вашего quest.zip архива -->
            <a href="quest.zip" class="btn" download>📥 Скачать файл</a>
        </div>
    </div>

    <script>
        const audio = document.getElementById('questAudio');
        const soundBtn = document.getElementById('soundBtn');
        const downloadArea = document.getElementById('downloadArea');

        soundBtn.addEventListener('click', function() {
            // Пытаемся воспроизвести звук
            audio.play().then(() => {
                // Если звук успешно включился:
                soundBtn.style.display = 'none'; // Скрываем кнопку звука
                downloadArea.style.display = 'block'; // Показываем область скачивания
            }).catch(error => {
                // Если браузер все равно заблокировал автовоспроизведение
                console.log("Ошибка воспроизведения:", error);
                alert("Не удалось включить звук автоматически. Попробуйте еще раз кликнуть по кнопке.");
            });
        });
    </script>

</body>
</html>
